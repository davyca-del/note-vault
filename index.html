<html lang="en">
<head>
<meta charset="UTF-8">

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body,#root{height:100%}
body{font-family:'DM Sans',sans-serif;background:#f1f5f9;-webkit-tap-highlight-color:transparent;overscroll-behavior:none;user-select:none}
textarea,input{user-select:text}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:4px}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes scaleIn{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:scale(1)}}
@keyframes fabPop{0%{transform:scale(0) rotate(-90deg)}70%{transform:scale(1.1) rotate(4deg)}100%{transform:scale(1) rotate(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
@keyframes bar1{0%,100%{height:4px}50%{height:16px}}
@keyframes bar2{0%,100%{height:8px}50%{height:22px}}

input::placeholder,textarea::placeholder{color:#94a3b8}
button{font-family:'DM Sans',sans-serif;cursor:pointer}
select{font-family:'DM Sans',sans-serif}
select option{background:white;color:#1e293b}
.tappable{transition:opacity .12s}

.note-card{transition:box-shadow .18s,transform .15s,opacity .12s}
.bottom-nav{padding-bottom:env(safe-area-inset-bottom,0px)}
.wave-bar{width:3px;border-radius:3px;display:inline-block;margin:0 1.5px;background:#f43f5e}
.wb1{animation:bar1 .8s ease-in-out infinite}
.wb2{animation:bar2 .8s ease-in-out .12s infinite}
.wb3{animation:bar3 .8s ease-in-out .24s infinite}
.wb4{animation:bar2 .8s ease-in-out .36s infinite}
.wb5{animation:bar1 .8s ease-in-out .48s infinite}
.wb6{animation:bar3 .8s ease-in-out .6s infinite}
.wb7{animation:bar2 .8s ease-in-out .72s infinite}
</style>

<body>
<div id="root"></div>
<script type="text/babel">
const{useState,useEffect,useRef,useCallback,useMemo}=React;

/* ── IndexedDB ── */
const DB_NAME='NoteVaultDB',DB_VER=1,STORE='notes';
function openDB(){
  return new Promise((res,rej)=>{
    const r=indexedDB.open(DB_NAME,DB_VER);
    r.onupgradeneeded=e=>{
      const db=e.target.result;
      if(!db.objectStoreNames.contains(STORE)){
        db.createObjectStore(STORE,{keyPath:'id'});
      }
    };
    r.onsuccess=e=>res(e.target.result);
    r.onerror=e=>rej(e.target.error);
  });
}
const idb={
  async getAll(){const db=await openDB();return new Promise((res,rej)=>{const tx=db.transaction(STORE,'readonly');const r=tx.objectStore(STORE).getAll();r.onsuccess=()=>res(r.result||[]);r.onerror=()=>rej(r.error);})},
  async put(n){const db=await openDB();return new Promise((res,rej)=>{const tx=db.transaction(STORE,'readwrite');const r=tx.objectStore(STORE).put(n);r.onsuccess=()=>res();r.onerror=()=>rej(r.error);})},
  async del(id){const db=await openDB();return new Promise((res,rej)=>{const tx=db.transaction(STORE,'readwrite');const r=tx.objectStore(STORE).delete(id);r.onsuccess=()=>res();r.onerror=()=>rej(r.error);})},
  async putMany(ns){const db=await openDB();return new Promise((res,rej)=>{const tx=db.transaction(STORE,'readwrite');const st=tx.objectStore(STORE);ns.forEach(n=>st.put(n));tx.oncomplete=()=>res();tx.onerror=()=>rej(tx.error);})}
};

/* ── Migration from localStorage ── */
const MIG_FLAG='nv-idb-migrated';
function migrateNote(n){
  const tags=[...(n.tags||[])];
  if(n.category&&n.category!=='Personal'){const ct=n.category.toLowerCase();if(!tags.includes(ct))tags.unshift(ct);}
  const{category,_migrated,...rest}=n;
  return{...rest,tags,image:n.image||null,audioData:n.audioData||null,audioDuration:n.audioDuration||null};
}
async function migrateFromLS(){
  if(localStorage.getItem(MIG_FLAG))return;
  for(const key of['nodevault-v3','nodevault-v2','nodevault-v1']){
    const raw=localStorage.getItem(key);
    if(raw){try{const ns=JSON.parse(raw).map(migrateNote);if(ns.length)await idb.putMany(ns);}catch(e){console.error(e);}break;}
  }
  localStorage.setItem(MIG_FLAG,'1');
}

/* ── Constants ── */
const ACCENTS=[
  {id:'none',  border:'#94a3b8',tint:'#ffffff',label:'White'},
  {id:'amber', border:'#f59e0b',tint:'#fffbeb',label:'Amber'},
  {id:'emerald',border:'#10b981',tint:'#ecfdf5',label:'Green'},
  {id:'rose',  border:'#f43f5e',tint:'#fff1f2',label:'Rose'},
  {id:'violet',border:'#8b5cf6',tint:'#f5f3ff',label:'Violet'},
  {id:'sky',   border:'#0ea5e9',tint:'#f0f9ff',label:'Sky'},
  {id:'orange',border:'#f97316',tint:'#fff7ed',label:'Orange'},
];
const mkId=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,6);
const newNote=(type='note')=>({id:mkId(),title:'',content:'',type,items:[],tags:[],color:'none',pinned:false,image:null,audioData:null,audioDuration:null,createdAt:new Date().toISOString(),updatedAt:new Date().toISOString()});
const fmtTime=s=>{const t=Math.floor(s);return`${Math.floor(t/60)}:${String(t%60).padStart(2,'0')}`;};

/* ── Image compress ── */
function compressImage(file,maxPx=1024,q=0.72){
  return new Promise((res,rej)=>{
    const img=new Image(),url=URL.createObjectURL(file);
    img.onload=()=>{
      URL.revokeObjectURL(url);
      let{width:w,height:h}=img;
      if(w>maxPx||h>maxPx){const r=Math.min(maxPx/w,maxPx/h);w=Math.round(w*r);h=Math.round(h*r);}
      const c=document.createElement('canvas');c.width=w;c.height=h;
      c.getContext('2d').drawImage(img,0,0,w,h);
      res(c.toDataURL('image/jpeg',q));
    };
    img.onerror=rej;img.src=url;
  });
}

/* ── Highlight ── */
function Hl({text,q}){
  if(!q||!text)return React.createElement(React.Fragment,null,text);
  const esc=q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
  const parts=text.split(new RegExp(`(${esc})`,'gi'));
  return React.createElement(React.Fragment,null,...parts.map((p,i)=>
    p.toLowerCase()===q.toLowerCase()
      ?<mark key={i} style={{background:'#fef08a',color:'#713f12',borderRadius:2,padding:'0 1px'}}>{p}</mark>
      :p
  ));
}

/* ── CheckCircle ── */
function CheckCircle({checked,color,size=24,onToggle}){
  return(
    <button onClick={e=>{e.stopPropagation();onToggle();}} style={{width:size,height:size,borderRadius:'50%',flexShrink:0,border:`2px solid ${checked?color:'#cbd5e1'}`,background:checked?color:'white',display:'flex',alignItems:'center',justifyContent:'center',transition:'all .2s',padding:0,minWidth:size,minHeight:size}}>
      {checked&&<svg width={size*.44} height={size*.44} viewBox="0 0 12 10" fill="none"><path d="M1 5l3.5 3.5L11 1" stroke="white" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"/></svg>}
    </button>
  );
}

/* ── AudioPlayer ── */
function AudioPlayer({audioData,duration,accent}){
  const[playing,setPlaying]=useState(false);
  const[progress,setProgress]=useState(0);
  const[elapsed,setElapsed]=useState(0);
  const aRef=useRef(null);
  useEffect(()=>{
    const a=new Audio(audioData);aRef.current=a;
    a.ontimeupdate=()=>{setElapsed(a.currentTime);setProgress(a.currentTime/(a.duration||1));};
    a.onended=()=>{setPlaying(false);setProgress(0);setElapsed(0);};
    return()=>{a.pause();a.src='';};
  },[audioData]);
  const toggle=e=>{e.stopPropagation();const a=aRef.current;if(!a)return;if(playing){a.pause();setPlaying(false);}else{a.play().catch(()=>{});setPlaying(true);}};
  return(
    <div style={{display:'flex',alignItems:'center',gap:10,background:'#f8fafc',borderRadius:12,padding:'10px 14px',border:'1px solid #e2e8f0'}}>
      <button onClick={toggle} style={{width:36,height:36,borderRadius:'50%',flexShrink:0,background:accent,border:'none',display:'flex',alignItems:'center',justifyContent:'center',color:'white',fontSize:13}}>
        {playing?'⏸':'▶'}
      </button>
      <div style={{flex:1}}>
        <div style={{height:4,borderRadius:4,background:'#e2e8f0',overflow:'hidden',marginBottom:4}}>
          <div style={{height:'100%',width:`${progress*100}%`,background:accent,borderRadius:4,transition:'width .1s linear'}}/>
        </div>
        <div style={{display:'flex',justifyContent:'space-between'}}>
          <span style={{fontSize:10.5,color:'#94a3b8'}}>{playing?fmtTime(elapsed):'🎤 Voice memo'}</span>
          <span style={{fontSize:10.5,color:'#94a3b8'}}>{fmtTime(duration||0)}</span>
        </div>
      </div>
    </div>
  );
}

/* ── VoiceRecorder ── */
function VoiceRecorder({onDone,onCancel,accent}){
  const[state,setState]=useState('idle');
  const[elapsed,setElapsed]=useState(0);
  const[audioURL,setAudioURL]=useState(null);
  const[audioB64,setAudioB64]=useState(null);
  const mrRef=useRef(null),chunksRef=useRef([]),timerRef=useRef(null);

  const startRec=async()=>{
    try{
      const stream=await navigator.mediaDevices.getUserMedia({audio:true});
      chunksRef.current=[];
      const mime=MediaRecorder.isTypeSupported('audio/webm;codecs=opus')?'audio/webm;codecs=opus':'audio/webm';
      const mr=new MediaRecorder(stream,{mimeType:mime});
      mrRef.current=mr;
      mr.ondataavailable=e=>{if(e.data.size>0)chunksRef.current.push(e.data);};
      mr.onstop=()=>{
        stream.getTracks().forEach(t=>t.stop());
        const blob=new Blob(chunksRef.current,{type:mr.mimeType});
        setAudioURL(URL.createObjectURL(blob));
        const reader=new FileReader();reader.onloadend=()=>setAudioB64(reader.result);reader.readAsDataURL(blob);
        setState('done');
      };
      mr.start(100);setState('recording');setElapsed(0);
      timerRef.current=setInterval(()=>setElapsed(s=>s+1),1000);
    }catch(e){alert('Microphone permission denied. Enable it in Chrome site settings.');}
  };
  const stopRec=()=>{clearInterval(timerRef.current);mrRef.current?.stop();};
  const confirmSave=()=>{if(audioB64)onDone(audioB64,elapsed);};
  const discard=()=>{clearInterval(timerRef.current);mrRef.current?.stop();setAudioURL(null);setAudioB64(null);setState('idle');onCancel();};
  useEffect(()=>()=>clearInterval(timerRef.current),[]);

  return(
    <div style={{background:'#fff1f2',border:'1px solid #fecdd3',borderRadius:14,padding:'20px',textAlign:'center'}}>
      {state==='idle'&&(
        <>
          <p style={{fontSize:13,color:'#64748b',marginBottom:16}}>Tap to start recording</p>
          <button onClick={startRec} style={{width:68,height:68,borderRadius:'50%',background:'#f43f5e',border:'none',fontSize:26,color:'white',display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto'}}>🎤</button>
        </>
      )}
      {state==='recording'&&(
        <>
          <div style={{fontSize:13,fontWeight:600,color:'#f43f5e',marginBottom:14,display:'flex',alignItems:'center',justifyContent:'center',gap:8}}>
            <span style={{width:8,height:8,borderRadius:'50%',background:'#f43f5e',display:'inline-block',animation:'pulse 1s infinite'}}/>
            Recording {fmtTime(elapsed)}
          </div>
          <div style={{display:'flex',alignItems:'center',justifyContent:'center',height:32,marginBottom:16,gap:0}}>
            {[1,2,3,4,5,6,7].map(i=><div key={i} className={`wave-bar wb${i>5?i-4:i}`} style={{animationDelay:`${i*0.09}s`}}/>)}
          </div>
          <button onClick={stopRec} style={{padding:'10px 28px',borderRadius:24,background:'#1e293b',border:'none',color:'white',fontSize:13,fontWeight:700}}>Stop</button>
        </>
      )}
      {state==='done'&&audioURL&&(
        <>
          <p style={{fontSize:13,color:'#64748b',marginBottom:10}}>Recording done · {fmtTime(elapsed)}</p>
          <audio src={audioURL} controls style={{width:'100%',marginBottom:14,borderRadius:8}}/>
          <div style={{display:'flex',gap:10,justifyContent:'center'}}>
            <button onClick={discard} style={{padding:'9px 20px',borderRadius:10,background:'#f1f5f9',border:'1px solid #e2e8f0',color:'#64748b',fontSize:13,fontWeight:600}}>Discard</button>
            <button onClick={confirmSave} style={{padding:'9px 20px',borderRadius:10,background:'#10b981',border:'none',color:'white',fontSize:13,fontWeight:700}}>Save memo</button>
          </div>
        </>
      )}
    </div>
  );
}

/* ── NoteCard ── */
function NoteCard({note,onOpen,sq,activeTag}){
  const acc=ACCENTS.find(a=>a.id===note.color)||ACCENTS[0];
  const checked=note.items.filter(i=>i.checked).length,total=note.items.length;
  return(
    <div className="note-card" onClick={()=>onOpen(note)} style={{background:acc.tint,borderRadius:14,border:'1px solid #e2e8f0',borderLeft:`4px solid ${acc.border}`,overflow:'hidden',cursor:'pointer',position:'relative'}}>
      {note.image&&<img src={note.image} style={{width:'100%',aspectRatio:'16/9',objectFit:'cover',display:'block'}} alt=""/>}
      <div style={{padding:'12px 13px 11px'}}>
        {note.pinned&&<span style={{position:'absolute',top:note.image?8:9,right:10,fontSize:13,filter:note.image?'drop-shadow(0 1px 2px rgba(0,0,0,.6))':'none'}}>📌</span>}
        <div style={{fontFamily:"'Lora',serif",fontSize:14.5,fontWeight:700,color:'#1e293b',marginBottom:5,lineHeight:1.3,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',paddingRight:note.pinned?22:0}}>
          {note.title?<Hl text={note.title} q={sq}/>:<span style={{color:'#cbd5e1',fontStyle:'italic'}}>Untitled</span>}
        </div>
        <div style={{display:'flex',flexWrap:'wrap',gap:4,marginBottom:6}}>
          {note.type==='checklist'&&<span style={{fontSize:10,color:'#64748b',background:'#f1f5f9',padding:'1px 7px',borderRadius:20}}>☑ List</span>}
          {note.audioData&&<span style={{fontSize:10,color:'#10b981',background:'#ecfdf5',padding:'1px 7px',borderRadius:20}}>🎤</span>}
          {note.image&&<span style={{fontSize:10,color:'#0ea5e9',background:'#f0f9ff',padding:'1px 7px',borderRadius:20}}>📷</span>}
          {note.tags.slice(0,3).map(t=><span key={t} style={{fontSize:10,fontWeight:t===activeTag?700:400,color:t===activeTag?'#1e293b':'#94a3b8',background:t===activeTag?'#e2e8f0':'transparent',padding:t===activeTag?'1px 6px':'1px 0',borderRadius:20}}>#{t}</span>)}
          {note.tags.length>3&&<span style={{fontSize:10,color:'#cbd5e1'}}>+{note.tags.length-3}</span>}
        </div>
        {note.type==='checklist'&&total>0?(
          <>
            <div style={{height:3,borderRadius:3,background:'#e2e8f0',marginBottom:5,overflow:'hidden'}}>
              <div style={{height:'100%',width:`${(checked/total)*100}%`,background:acc.border,borderRadius:3,transition:'width .3s'}}/>
            </div>
            <div style={{fontSize:11,color:'#94a3b8',marginBottom:5}}>{checked}/{total} done</div>
            {note.items.slice(0,3).map(item=>(
              <div key={item.id} style={{display:'flex',alignItems:'center',gap:6,marginBottom:3}}>
                <span style={{width:11,height:11,borderRadius:'50%',flexShrink:0,border:`2px solid ${item.checked?acc.border:'#cbd5e1'}`,background:item.checked?acc.border:'transparent',display:'inline-flex',alignItems:'center',justifyContent:'center',fontSize:6,color:'white'}}>{item.checked?'✓':''}</span>
                <span style={{fontSize:12,color:item.checked?'#94a3b8':'#475569',textDecoration:item.checked?'line-through':'none',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}><Hl text={item.text} q={sq}/></span>
              </div>
            ))}
            {total>3&&<div style={{fontSize:10.5,color:'#94a3b8',marginTop:1}}>+{total-3} more</div>}
          </>
        ):note.content?(
          <p style={{fontSize:12.5,color:'#64748b',lineHeight:1.55,margin:0,display:'-webkit-box',WebkitLineClamp:note.image?2:3,WebkitBoxOrient:'vertical',overflow:'hidden'}}>
            <Hl text={note.content} q={sq}/>
          </p>
        ):note.audioData&&!note.content?(
          <p style={{fontSize:12.5,color:'#94a3b8',fontStyle:'italic',margin:0}}>Voice memo</p>
        ):null}
        <div style={{marginTop:8,fontSize:10,color:'#94a3b8'}}>{new Date(note.updatedAt).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'})}</div>
      </div>
    </div>
  );
}

/* ── NoteEditor ── */
function NoteEditor({note,onSave,onClose,onDelete,allTags}){
  const[draft,setDraft]=useState({...note,items:note.items.map(i=>({...i}))});
  const[tagInput,setTagInput]=useState('');
  const[showOpts,setShowOpts]=useState(false);
  const[tagSugs,setTagSugs]=useState([]);
  const[showRec,setShowRec]=useState(false);
  const[imgBusy,setImgBusy]=useState(false);
  const acc=ACCENTS.find(a=>a.id===draft.color)||ACCENTS[0];
  const textRef=useRef(null),fileRef=useRef(null),camRef=useRef(null);
  const isNew=!note.title&&!note.content&&note.items.length===0&&!note.image&&!note.audioData;

  useEffect(()=>{
    if(draft.type==='note'&&textRef.current&&!draft.image){
      setTimeout(()=>{textRef.current?.focus();textRef.current?.setSelectionRange(draft.content.length,draft.content.length);},200);
    }
  },[]);

  const up=(k,v)=>setDraft(d=>({...d,[k]:v,updatedAt:new Date().toISOString()}));

  useEffect(()=>{
    if(!tagInput.trim()){setTagSugs([]);return;}
    const q=tagInput.toLowerCase();
    setTagSugs(allTags.filter(t=>t.includes(q)&&!draft.tags.includes(t)).slice(0,4));
  },[tagInput,allTags,draft.tags]);

  const addItem=afterId=>{
    const n={id:mkId(),text:'',checked:false};
    const items=draft.items,idx=afterId?items.findIndex(i=>i.id===afterId):items.length-1;
    up('items',[...items.slice(0,idx+1),n,...items.slice(idx+1)]);
    setTimeout(()=>document.getElementById(`ei-${n.id}`)?.focus(),60);
  };
  const updI=(id,text)=>up('items',draft.items.map(i=>i.id===id?{...i,text}:i));
  const togI=id=>up('items',draft.items.map(i=>i.id===id?{...i,checked:!i.checked}:i));
  const delI=id=>up('items',draft.items.filter(i=>i.id!==id));

  const addTag=t=>{
    const tag=(t||tagInput).trim().toLowerCase().replace(/\s+/g,'-').replace(/[^a-z0-9-]/g,'');
    if(tag&&!draft.tags.includes(tag))up('tags',[...draft.tags,tag]);
    setTagInput('');setTagSugs([]);
  };

  const handleImg=async file=>{
    if(!file||!file.type.startsWith('image/'))return;
    setImgBusy(true);
    try{const b64=await compressImage(file);up('image',b64);}
    catch(e){alert('Could not load image');}
    setImgBusy(false);
  };

  const handleSave=()=>{
    const has=draft.title.trim()||draft.content.trim()||draft.items.some(i=>i.text.trim())||draft.image||draft.audioData;
    if(has)onSave({...draft,items:draft.items.filter(i=>i.text.trim())});
    onClose();
  };
  const handleDelete=()=>{if(confirm('Delete this note?')){onDelete(draft.id);onClose();}};

  const ordered=[...draft.items.filter(i=>!i.checked),...draft.items.filter(i=>i.checked)];
  const checked=draft.items.filter(i=>i.checked).length,total=draft.items.length;

  return(
    <div style={{position:'fixed',inset:0,zIndex:300,background:'white',display:'flex',flexDirection:'column',animation:'scaleIn .18s ease'}}>
      {/* Top bar */}
      <div style={{display:'flex',alignItems:'center',padding:'10px 12px',borderBottom:'1px solid #f1f5f9',flexShrink:0,gap:2,background:acc.tint}}>
        <button className="tappable" onClick={handleSave} style={{background:'none',border:'none',padding:'8px',fontSize:22,color:'#1e293b',lineHeight:1,minWidth:44,minHeight:44,display:'flex',alignItems:'center',justifyContent:'center'}}>←</button>
        <div style={{display:'flex',background:'rgba(0,0,0,.06)',borderRadius:10,padding:3,gap:2}}>
          {['note','checklist'].map(t=>(
            <button key={t} onClick={()=>up('type',t)} style={{background:draft.type===t?'white':'none',border:'none',color:draft.type===t?'#1e293b':'#64748b',fontSize:12,fontWeight:draft.type===t?700:400,padding:'6px 10px',borderRadius:8,boxShadow:draft.type===t?'0 1px 4px rgba(0,0,0,.10)':'none',transition:'all .15s',whiteSpace:'nowrap'}}>
              {t==='note'?'📝 Note':'☑ List'}
            </button>
          ))}
        </div>
        <div style={{flex:1}}/>
        <button className="tappable" onClick={()=>up('pinned',!draft.pinned)} style={{background:'none',border:'none',padding:'8px',fontSize:19,opacity:draft.pinned?1:.25,transition:'opacity .2s',minWidth:44,minHeight:44,display:'flex',alignItems:'center',justifyContent:'center'}}>📌</button>
        <button className="tappable" onClick={()=>setShowOpts(s=>!s)} style={{background:'none',border:'none',padding:'8px',minWidth:44,minHeight:44,display:'flex',alignItems:'center',justifyContent:'center'}}>
          <span style={{width:22,height:22,borderRadius:'50%',background:acc.border,border:'2px solid rgba(0,0,0,.15)',display:'block'}}/>
        </button>
        {!isNew&&<button className="tappable" onClick={handleDelete} style={{background:'none',border:'none',padding:'8px',fontSize:17,color:'#f43f5e',minWidth:44,minHeight:44,display:'flex',alignItems:'center',justifyContent:'center'}}>🗑</button>}
      </div>

      {/* Colour panel */}
      {showOpts&&(
        <div style={{borderBottom:'1px solid #f1f5f9',padding:'14px 18px',background:'#fafafa',flexShrink:0,animation:'fadeIn .12s ease'}}>
          <div style={{fontSize:10,fontWeight:700,color:'#94a3b8',letterSpacing:1,marginBottom:10}}>NOTE COLOUR</div>
          <div style={{display:'flex',gap:12,flexWrap:'wrap'}}>
            {ACCENTS.map(a=>(
              <button key={a.id} onClick={()=>{up('color',a.id);setShowOpts(false);}} title={a.label} style={{width:34,height:34,borderRadius:'50%',background:a.border,padding:0,border:draft.color===a.id?'3px solid #1e293b':'3px solid transparent',outline:draft.color===a.id?'2px solid white':'none',outlineOffset:-4,transition:'border .15s'}}/>
            ))}
          </div>
        </div>
      )}

      {/* Body */}
      <div style={{flex:1,overflowY:'auto',background:acc.tint}}>
        {draft.image&&(
          <div style={{position:'relative'}}>
            <img src={draft.image} style={{width:'100%',maxHeight:260,objectFit:'cover',display:'block'}} alt=""/>
            <button onClick={()=>up('image',null)} style={{position:'absolute',top:10,right:10,background:'rgba(0,0,0,.55)',border:'none',borderRadius:'50%',color:'white',width:30,height:30,fontSize:15,display:'flex',alignItems:'center',justifyContent:'center',backdropFilter:'blur(4px)'}}>×</button>
          </div>
        )}

        <div style={{padding:'18px 18px 40px'}}>
          <input value={draft.title} onChange={e=>up('title',e.target.value)} placeholder="Title"
            style={{width:'100%',border:'none',outline:'none',background:'none',fontFamily:"'Lora',serif",fontSize:25,fontWeight:700,color:'#1e293b',marginBottom:4,lineHeight:1.25}}/>
          <div style={{height:1,background:'#e2e8f0',marginBottom:16}}/>

          {draft.type==='note'?(
            <textarea ref={textRef} value={draft.content} onChange={e=>up('content',e.target.value)} placeholder="Start writing…"
              style={{width:'100%',minHeight:180,border:'none',outline:'none',background:'none',resize:'none',fontSize:16,lineHeight:1.8,color:'#374151',fontFamily:"'DM Sans',sans-serif"}}/>
          ):(
            <div>
              {total>0&&(
                <div style={{marginBottom:14}}>
                  <div style={{height:5,borderRadius:5,background:'#e2e8f0',overflow:'hidden'}}>
                    <div style={{height:'100%',borderRadius:5,width:`${(checked/total)*100}%`,background:acc.border,transition:'width .3s'}}/>
                  </div>
                  <div style={{fontSize:11.5,color:'#94a3b8',marginTop:4,textAlign:'right'}}>{checked} of {total} done</div>
                </div>
              )}
              {ordered.map(item=>(
                <div key={item.id} style={{display:'flex',alignItems:'center',gap:12,marginBottom:10,minHeight:44}}>
                  <CheckCircle checked={item.checked} color={acc.border} size={24} onToggle={()=>togI(item.id)}/>
                  <input id={`ei-${item.id}`} value={item.text} onChange={e=>updI(item.id,e.target.value)}
                    onKeyDown={e=>{if(e.key==='Enter'){e.preventDefault();addItem(item.id);}if(e.key==='Backspace'&&!item.text){e.preventDefault();delI(item.id);}}}
                    placeholder="List item…"
                    style={{flex:1,border:'none',outline:'none',background:'none',fontSize:16,color:item.checked?'#94a3b8':'#374151',textDecoration:item.checked?'line-through':'none',transition:'color .2s',minHeight:44}}/>
                  <button onClick={()=>delI(item.id)} style={{background:'none',border:'none',color:'#cbd5e1',fontSize:20,padding:'8px',minWidth:44,minHeight:44,display:'flex',alignItems:'center',justifyContent:'center'}}>×</button>
                </div>
              ))}
              <button onClick={()=>addItem()} style={{display:'flex',alignItems:'center',gap:10,padding:'10px 0',background:'none',border:'none',color:acc.border,fontSize:15,fontWeight:600,minHeight:44}}>
                <span style={{width:24,height:24,borderRadius:'50%',border:`2px dashed ${acc.border}`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:18}}>+</span>
                Add item
              </button>
            </div>
          )}

          {/* Voice memo */}
          <div style={{marginTop:22,paddingTop:16,borderTop:'1px solid #e2e8f0'}}>
            <div style={{fontSize:10,fontWeight:700,color:'#94a3b8',letterSpacing:1,marginBottom:10}}>VOICE MEMO</div>
            {draft.audioData?(
              <div style={{position:'relative'}}>
                <AudioPlayer audioData={draft.audioData} duration={draft.audioDuration} accent={acc.border}/>
                <button onClick={()=>{up('audioData',null);up('audioDuration',null);}} style={{position:'absolute',top:-8,right:-8,background:'white',border:'1px solid #e2e8f0',borderRadius:'50%',width:24,height:24,fontSize:13,color:'#94a3b8',display:'flex',alignItems:'center',justifyContent:'center',boxShadow:'0 1px 4px rgba(0,0,0,.1)'}}>×</button>
              </div>
            ):showRec?(
              <VoiceRecorder accent={acc.border} onDone={(data,dur)=>{up('audioData',data);up('audioDuration',dur);setShowRec(false);}} onCancel={()=>setShowRec(false)}/>
            ):(
              <button onClick={()=>setShowRec(true)} style={{display:'flex',alignItems:'center',gap:10,padding:'12px 16px',background:'#f8fafc',border:'1.5px dashed #cbd5e1',borderRadius:12,width:'100%',color:'#64748b',fontSize:14,fontWeight:500}}>
                <span style={{fontSize:20}}>🎤</span>Record a voice memo
              </button>
            )}
          </div>

          {/* Photo */}
          <div style={{marginTop:18,paddingTop:16,borderTop:'1px solid #e2e8f0'}}>
            <div style={{fontSize:10,fontWeight:700,color:'#94a3b8',letterSpacing:1,marginBottom:10}}>PHOTO</div>
            {draft.image?(
              <p style={{fontSize:12.5,color:'#94a3b8'}}>Photo attached — tap × on the image to remove.</p>
            ):imgBusy?(
              <div style={{padding:'14px',textAlign:'center',color:'#94a3b8',fontSize:13}}>Compressing…</div>
            ):(
              <div style={{display:'flex',gap:10}}>
                <label style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center',gap:7,padding:'13px',background:'#f0f9ff',border:'1.5px dashed #0ea5e9',borderRadius:12,cursor:'pointer',color:'#0ea5e9',fontSize:13,fontWeight:600}}>
                  <span style={{fontSize:20}}>📷</span>Camera
                  <input ref={camRef} type="file" accept="image/*" capture="environment" style={{display:'none'}} onChange={e=>handleImg(e.target.files[0])}/>
                </label>
                <label style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center',gap:7,padding:'13px',background:'#f8fafc',border:'1.5px dashed #cbd5e1',borderRadius:12,cursor:'pointer',color:'#64748b',fontSize:13,fontWeight:600}}>
                  <span style={{fontSize:20}}>🖼️</span>Gallery
                  <input ref={fileRef} type="file" accept="image/*" style={{display:'none'}} onChange={e=>handleImg(e.target.files[0])}/>
                </label>
              </div>
            )}
          </div>

          {/* Tags */}
          <div style={{marginTop:18,paddingTop:16,borderTop:'1px solid #e2e8f0'}}>
            <div style={{fontSize:10,fontWeight:700,color:'#94a3b8',letterSpacing:1,marginBottom:10}}>TAGS</div>
            {draft.tags.length>0&&(
              <div style={{display:'flex',flexWrap:'wrap',gap:7,marginBottom:10}}>
                {draft.tags.map(t=>(
                  <span key={t} style={{display:'inline-flex',alignItems:'center',gap:5,background:'#f1f5f9',border:'1px solid #e2e8f0',color:'#475569',fontSize:13,padding:'5px 12px',borderRadius:20}}>
                    #{t}<button onClick={()=>up('tags',draft.tags.filter(x=>x!==t))} style={{background:'none',border:'none',color:'#94a3b8',padding:0,fontSize:16,lineHeight:1,minWidth:20,minHeight:20,display:'flex',alignItems:'center',justifyContent:'center'}}>×</button>
                  </span>
                ))}
              </div>
            )}
            <div style={{position:'relative'}}>
              <input value={tagInput} onChange={e=>setTagInput(e.target.value)}
                onKeyDown={e=>{if(e.key==='Enter'||e.key===','){e.preventDefault();addTag();}}}
                placeholder="Add tag, press Enter…"
                onFocus={e=>e.target.style.borderColor='#94a3b8'}
                onBlur={e=>e.target.style.borderColor='#e2e8f0'}
                style={{width:'100%',border:'1.5px solid #e2e8f0',borderRadius:12,background:'white',color:'#374151',fontSize:14,padding:'11px 14px',outline:'none',transition:'border-color .15s',minHeight:44}}/>
              {tagSugs.length>0&&(
                <div style={{position:'absolute',top:'calc(100% + 4px)',left:0,right:0,background:'white',border:'1px solid #e2e8f0',borderRadius:12,overflow:'hidden',boxShadow:'0 4px 16px rgba(0,0,0,.10)',zIndex:10}}>
                  {tagSugs.map(t=>(
                    <button key={t} onClick={()=>addTag(t)} style={{width:'100%',padding:'11px 14px',background:'none',border:'none',borderBottom:'1px solid #f1f5f9',textAlign:'left',fontSize:13.5,color:'#374151',minHeight:44}}>#{t}</button>
                  ))}
                </div>
              )}
            </div>
          </div>
        </div>
      </div>

      {/* Save bar */}
      <div style={{padding:'12px 16px',borderTop:'1px solid #f1f5f9',background:'white',flexShrink:0,paddingBottom:'calc(12px + env(safe-area-inset-bottom,0px))'}}>
        <button className="tappable" onClick={handleSave} style={{width:'100%',background:'#1e293b',border:'none',borderRadius:12,color:'white',fontSize:15,fontWeight:700,padding:'14px',boxShadow:'0 4px 14px rgba(30,41,59,.25)'}}>Save note</button>
      </div>
    </div>
  );
}

/* ── Type Picker ── */

  return(

      <div onClick={e=>e.stopPropagation()} style={{width:'100%',background:'white',borderRadius:'20px 20px 0 0',padding:'22px 20px 48px',animation:'slideUp .22s ease'}}>
        <div style={{width:36,height:4,borderRadius:2,background:'#e2e8f0',margin:'0 auto 22px'}}/>
        <div style={{fontSize:11,fontWeight:700,color:'#94a3b8',letterSpacing:1,marginBottom:14}}>CREATE NEW</div>
        {[{type:'note',icon:'📝',title:'Note',desc:'Free-form text and thoughts'},{type:'checklist',icon:'☑️',title:'Checklist',desc:'Shopping lists, tasks, to-dos'}].map(({type,icon,title,desc})=>(
          <button key={type} onClick={()=>onPick(type)} style={{width:'100%',display:'flex',alignItems:'center',gap:16,padding:'15px',background:'#f8fafc',border:'1px solid #e2e8f0',borderRadius:14,marginBottom:10,textAlign:'left'}}>
            <span style={{fontSize:28,lineHeight:1}}>{icon}</span>
            <div><div style={{fontSize:15,fontWeight:700,color:'#1e293b',marginBottom:2}}>{title}</div><div style={{fontSize:13,color:'#64748b'}}>{desc}</div></div>
          </button>
        ))}
        <p style={{fontSize:12,color:'#94a3b8',textAlign:'center',marginTop:6}}>Photos &amp; voice memos can be added inside any note</p>
      </div>
    </div>
  );
}

/* ── Data Sheet ── */
function DataSheet({notes,setNotes,onClose}){
  const[busy,setBusy]=useState(false);
  const doExport=async()=>{
    setBusy(true);
    try{const blob=new Blob([JSON.stringify(notes,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`nodevault-${new Date().toISOString().slice(0,10)}.json`;a.click();}
    finally{setBusy(false);}
  };
  return(
    <div onClick={onClose} style={{position:'fixed',inset:0,background:'rgba(0,0,0,.4)',zIndex:200,display:'flex',alignItems:'flex-end',animation:'fadeIn .15s ease'}}>
      <div onClick={e=>e.stopPropagation()} style={{width:'100%',background:'white',borderRadius:'20px 20px 0 0',padding:'20px 20px 48px',animation:'slideUp .22s ease'}}>
        <div style={{width:36,height:4,borderRadius:2,background:'#e2e8f0',margin:'0 auto 20px'}}/>
        <div style={{fontSize:11,fontWeight:700,color:'#94a3b8',letterSpacing:1,marginBottom:6}}>DATA &amp; BACKUP</div>
        <p style={{fontSize:12,color:'#94a3b8',marginBottom:14,lineHeight:1.5}}>
          {notes.length} notes · {notes.filter(n=>n.image).length} with photos · {notes.filter(n=>n.audioData).length} with voice memos
        </p>
        <button onClick={doExport} disabled={busy} style={{width:'100%',display:'flex',alignItems:'center',gap:14,padding:'15px',background:'#f8fafc',border:'1px solid #e2e8f0',borderRadius:14,marginBottom:10,textAlign:'left',opacity:busy?.6:1}}>
          <span style={{fontSize:22}}>{busy?'⏳':'⬇️'}</span>
          <div><div style={{fontSize:14,fontWeight:700,color:'#1e293b',marginBottom:2}}>Export all notes</div><div style={{fontSize:12,color:'#64748b'}}>JSON file including photos &amp; audio</div></div>
        </button>
        <label style={{width:'100%',display:'flex',alignItems:'center',gap:14,padding:'15px',background:'#f8fafc',border:'1px solid #e2e8f0',borderRadius:14,cursor:'pointer',marginBottom:14}}>
          <span style={{fontSize:22}}>⬆️</span>
          <div><div style={{fontSize:14,fontWeight:700,color:'#1e293b',marginBottom:2}}>Import backup</div><div style={{fontSize:12,color:'#64748b'}}>Old &amp; new formats both supported</div></div>
          <input type="file" accept=".json" style={{display:'none'}} onChange={e=>{
            const file=e.target.files[0];if(!file)return;
            const reader=new FileReader();
            reader.onload=async ev=>{
              try{
                const imp=JSON.parse(ev.target.result).map(migrateNote);
                if(!Array.isArray(imp))throw new Error();
                if(!confirm(`Import ${imp.length} notes? Duplicates skipped.`))return;
                const ex=await idb.getAll(),ids=new Set(ex.map(n=>n.id));
                const fresh=imp.filter(n=>!ids.has(n.id));
                if(fresh.length)await idb.putMany(fresh);
                setNotes(await idb.getAll());
                alert(`Imported ${fresh.length} new notes.`);onClose();
              }catch(e){alert('Could not read backup file.');}
            };
            reader.readAsText(file);e.target.value='';
          }}/>
        </label>
        <div style={{padding:'11px 13px',background:'#fefce8',border:'1px solid #fde68a',borderRadius:10}}>
          <p style={{fontSize:12,color:'#713f12',lineHeight:1.5}}>💡 Photos &amp; audio are included in the export. Save to Google Drive or your NAS.</p>
        </div>
      </div>
    </div>
  );
}

/* ── Main App ── */
function App(){
  const[notes,setNotes]=useState([]);
  const[loaded,setLoaded]=useState(false);
  const[search,setSearch]=useState('');
  const[searching,setSearching]=useState(false);
  const[activeTag,setActiveTag]=useState(null);
  const[activeView,setActiveView]=useState('all');
  const[sortBy,setSortBy]=useState('updated');
  const[editNote,setEditNote]=useState(null);
  const[showPicker,setPicker]=useState(false);
  const[showData,setData]=useState(false);
  const searchRef=useRef(null);

  useEffect(()=>{(async()=>{await migrateFromLS();setNotes(await idb.getAll());setLoaded(true);})();},[]);

  const saveNote=async note=>{await idb.put(note);setNotes(await idb.getAll());};
  const deleteNote=async id=>{await idb.del(id);setNotes(prev=>prev.filter(n=>n.id!==id));};
  const openNew=type=>{setPicker(false);setEditNote(newNote(type));};

  const allTags=useMemo(()=>{const f={};notes.forEach(n=>n.tags.forEach(t=>{f[t]=(f[t]||0)+1;}));return Object.entries(f).sort((a,b)=>b[1]-a[1]).map(([t])=>t);},[notes]);
  const tagCounts=useMemo(()=>{const c={};notes.forEach(n=>n.tags.forEach(t=>{c[t]=(c[t]||0)+1;}));return c;},[notes]);

  const filtered=useMemo(()=>notes
    .filter(n=>{
      if(activeView==='lists'&&n.type!=='checklist')return false;
      if(activeView==='pinned'&&!n.pinned)return false;
      if(activeTag&&!n.tags.includes(activeTag))return false;
      if(search){const q=search.toLowerCase();return n.title.toLowerCase().includes(q)||n.content.toLowerCase().includes(q)||n.tags.some(t=>t.includes(q))||n.items.some(i=>i.text.toLowerCase().includes(q));}
      return true;
    })
    .sort((a,b)=>{
      if(a.pinned!==b.pinned)return a.pinned?-1:1;
      if(sortBy==='updated')return new Date(b.updatedAt)-new Date(a.updatedAt);
      if(sortBy==='created')return new Date(b.createdAt)-new Date(a.createdAt);
      if(sortBy==='title')return a.title.localeCompare(b.title);
      return 0;
    })
  ,[notes,activeView,activeTag,search,sortBy]);

  const pinnedCount=notes.filter(n=>n.pinned).length;
  const listsCount=notes.filter(n=>n.type==='checklist').length;
  const hasFilter=activeTag||activeView!=='all'||search;
  const clearFilters=()=>{setActiveTag(null);setActiveView('all');setSearch('');setSearching(false);};

  const col1=filtered.filter((_,i)=>i%2===0);
  const col2=filtered.filter((_,i)=>i%2!==0);

  return(
    <div style={{display:'flex',flexDirection:'column',height:'100%',maxWidth:680,margin:'0 auto',position:'relative',background:'#f1f5f9'}}>

      {/* Header */}
      {!searching?(
        <div style={{background:'white',borderBottom:'1px solid #f1f5f9',flexShrink:0,boxShadow:'0 1px 6px rgba(0,0,0,.05)'}}>
          <div style={{display:'flex',alignItems:'center',gap:4,padding:'12px 14px 10px'}}>
            <div style={{flex:1}}>
              <div style={{fontFamily:"'Lora',serif",fontSize:21,fontWeight:700,color:'#1e293b',letterSpacing:-.3,lineHeight:1}}>NoteVault</div>
              <div style={{fontSize:10.5,color:'#94a3b8',marginTop:1}}>{loaded?`${notes.length} note${notes.length!==1?'s':''}${pinnedCount>0?` · ${pinnedCount} pinned`:''}` :'Loading…'}</div>
            </div>
            <button className="tappable" onClick={()=>{setSearching(true);setTimeout(()=>searchRef.current?.focus(),80);}} style={{background:'none',border:'none',padding:'8px',fontSize:20,color:'#64748b',minWidth:44,minHeight:44,display:'flex',alignItems:'center',justifyContent:'center'}}>⌕</button>
            <select value={sortBy} onChange={e=>setSortBy(e.target.value)} style={{background:'none',border:'none',color:'#64748b',fontSize:12,fontWeight:600,padding:'8px 2px',cursor:'pointer',outline:'none',minHeight:44}}>
              <option value="updated">Recent</option>
              <option value="created">Newest</option>
              <option value="title">A–Z</option>
            </select>
            <button className="tappable" onClick={()=>setData(true)} style={{background:'none',border:'none',padding:'8px',fontSize:20,color:'#64748b',minWidth:44,minHeight:44,display:'flex',alignItems:'center',justifyContent:'center'}}>⋯</button>
          </div>
          {allTags.length>0&&(
            <div style={{paddingLeft:14,paddingRight:14,paddingBottom:10,overflowX:'auto',display:'flex',gap:7,msOverflowStyle:'none',scrollbarWidth:'none'}}>
              {activeTag&&<button onClick={()=>setActiveTag(null)} style={{display:'inline-flex',alignItems:'center',gap:4,padding:'5px 11px',borderRadius:20,border:'none',background:'#fee2e2',color:'#ef4444',fontSize:12,fontWeight:700,whiteSpace:'nowrap',flexShrink:0}}>× clear</button>}
              {allTags.map(t=>(
                <button key={t} onClick={()=>setActiveTag(activeTag===t?null:t)} style={{display:'inline-flex',alignItems:'center',gap:4,padding:'5px 11px',borderRadius:20,border:activeTag===t?'none':'1px solid #e2e8f0',background:activeTag===t?'#1e293b':'white',color:activeTag===t?'white':'#64748b',fontSize:12,fontWeight:activeTag===t?700:400,whiteSpace:'nowrap',flexShrink:0,boxShadow:activeTag===t?'none':'0 1px 2px rgba(0,0,0,.06)'}}>
                  #{t}<span style={{fontSize:9.5,fontWeight:700,background:activeTag===t?'rgba(255,255,255,.2)':'#f1f5f9',color:activeTag===t?'white':'#94a3b8',borderRadius:10,padding:'1px 5px'}}>{tagCounts[t]}</span>
                </button>
              ))}
            </div>
          )}
        </div>
      ):(
        <div style={{background:'white',borderBottom:'1px solid #f1f5f9',padding:'10px 14px',flexShrink:0,display:'flex',alignItems:'center',gap:10,boxShadow:'0 1px 6px rgba(0,0,0,.05)'}}>
          <div style={{flex:1,position:'relative'}}>
            <span style={{position:'absolute',left:11,top:'50%',transform:'translateY(-50%)',color:'#94a3b8',fontSize:17,pointerEvents:'none'}}>⌕</span>
            <input ref={searchRef} value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search notes and tags…"
              style={{width:'100%',background:'#f8fafc',border:'1.5px solid #e2e8f0',borderRadius:12,color:'#1e293b',fontSize:15,padding:'10px 14px 10px 37px',outline:'none'}}/>
          </div>
          <button className="tappable" onClick={()=>{setSearch('');setSearching(false);}} style={{background:'none',border:'none',color:'#475569',fontSize:14,fontWeight:600,padding:'8px',minWidth:44,minHeight:44,whiteSpace:'nowrap'}}>Cancel</button>
        </div>
      )}

      {/* Notes */}
      <div style={{flex:1,overflowY:'auto',padding:'12px 11px 110px'}}>
        {hasFilter&&!searching&&(
          <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:10,padding:'0 2px'}}>
            <span style={{fontSize:11.5,color:'#94a3b8'}}>{filtered.length} note{filtered.length!==1?'s':''}{activeTag?` tagged #${activeTag}`:''}{activeView==='lists'?' · lists':''}{activeView==='pinned'?' · pinned':''}</span>
            <button onClick={clearFilters} style={{background:'none',border:'none',color:'#94a3b8',fontSize:11.5,textDecoration:'underline',cursor:'pointer',padding:0}}>clear</button>
          </div>
        )}
        {search&&filtered.length>0&&<div style={{fontSize:11.5,color:'#94a3b8',marginBottom:10,padding:'0 2px'}}>{filtered.length} result{filtered.length!==1?'s':''} for <strong style={{color:'#475569'}}>"{search}"</strong></div>}

        {!loaded?(
          <div style={{textAlign:'center',padding:60,color:'#94a3b8'}}>Loading…</div>
        ):filtered.length===0?(
          <div style={{textAlign:'center',padding:'60px 20px',animation:'fadeIn .3s ease'}}>
            <div style={{fontSize:50,marginBottom:14}}>{search?'🔍':activeTag?'🏷️':'📝'}</div>
            <p style={{color:'#64748b',fontSize:16,fontWeight:500,marginBottom:5}}>{search?`No results for "${search}"`:activeTag?`No notes tagged #${activeTag}`:'No notes yet'}</p>
            <p style={{color:'#94a3b8',fontSize:13}}>{!search&&!activeTag&&'Tap + to write your first note'}</p>
          </div>
        ):(
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,alignItems:'start'}}>
            <div style={{display:'flex',flexDirection:'column',gap:10}}>
              {col1.map((note,i)=>(
                <div key={note.id} style={{animation:`fadeUp .2s ease ${Math.min(i,5)*40}ms both`}}>
                  <NoteCard note={note} onOpen={n=>{setEditNote(n);setSearching(false);}} sq={search} activeTag={activeTag}/>
                </div>
              ))}
            </div>
            <div style={{display:'flex',flexDirection:'column',gap:10}}>
              {col2.map((note,i)=>(
                <div key={note.id} style={{animation:`fadeUp .2s ease ${Math.min(i,5)*40+20}ms both`}}>
                  <NoteCard note={note} onOpen={n=>{setEditNote(n);setSearching(false);}} sq={search} activeTag={activeTag}/>
                </div>
              ))}
            </div>
          </div>
        )}
      </div>

      {/* FAB */}
      {!editNote&&(
        <button className="tappable" onClick={()=>setPicker(true)} style={{position:'fixed',bottom:'calc(64px + env(safe-area-inset-bottom,10px))',left:'50%',transform:'translateX(calc(-50% + min(170px,50vw - 44px)))',width:56,height:56,background:'#1e293b',border:'none',borderRadius:'50%',color:'white',fontSize:28,lineHeight:1,boxShadow:'0 6px 20px rgba(30,41,59,.38)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:100,animation:'fabPop .4s cubic-bezier(.34,1.56,.64,1) .1s both'}} aria-label="New note">+</button>
      )}

      {/* Bottom Nav */}
      <div className="bottom-nav" style={{position:'fixed',bottom:0,left:'50%',transform:'translateX(-50%)',width:'100%',maxWidth:680,background:'white',borderTop:'1px solid #f1f5f9',display:'grid',gridTemplateColumns:'1fr 1fr 1fr 1fr',zIndex:100,boxShadow:'0 -2px 12px rgba(0,0,0,.06)'}}>
        {[{view:'all',icon:'🏠',label:'All'},{view:'lists',icon:'☑️',label:`Lists${listsCount?` (${listsCount})`:''}`},{view:'pinned',icon:'📌',label:`Pinned${pinnedCount?` (${pinnedCount})`:''}`}].map(({view,icon,label})=>{
          const active=activeView===view&&!activeTag&&!searching;
          return(
            <button key={view} onClick={()=>{setActiveView(view);setActiveTag(null);setSearching(false);}} style={{background:'none',border:'none',padding:'10px 4px 8px',display:'flex',flexDirection:'column',alignItems:'center',gap:2,minHeight:58}}>
              <span style={{fontSize:20,lineHeight:1}}>{icon}</span>
              <span style={{fontSize:9.5,fontWeight:active?700:500,color:active?'#1e293b':'#94a3b8',textAlign:'center',lineHeight:1.2}}>{label}</span>
            </button>
          );
        })}
        <button onClick={()=>{setSearching(true);setTimeout(()=>searchRef.current?.focus(),80);}} style={{background:'none',border:'none',padding:'10px 4px 8px',display:'flex',flexDirection:'column',alignItems:'center',gap:2,minHeight:58}}>
          <span style={{fontSize:20,lineHeight:1}}>🔍</span>
          <span style={{fontSize:9.5,fontWeight:searching?700:500,color:searching?'#1e293b':'#94a3b8'}}>Search</span>
        </button>
      </div>

      {/* Sheets */}
      {showPicker&&<TypePicker onPick={openNew} onClose={()=>setPicker(false)}/>}
      {showData&&<DataSheet notes={notes} setNotes={setNotes} onClose={()=>setData(false)}/>}
      {editNote&&<NoteEditor note={editNote} onSave={saveNote} onDelete={deleteNote} onClose={()=>setEditNote(null)} allTags={allTags}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
