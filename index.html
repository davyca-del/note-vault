<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NoteVault</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@700;800&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #f1f5f9; font-family: 'DM Sans', sans-serif; }
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: #f1f5f9; }
  ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes cardIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes modalIn { from { opacity: 0; transform: scale(.97); } to { opacity: 1; transform: scale(1); } }
  input::placeholder, textarea::placeholder { color: #cbd5e1; }
  select option { background: white; color: #374151; }
  button { font-family: 'DM Sans', sans-serif; }
  .card:hover { box-shadow: 0 4px 18px rgba(0,0,0,.09) !important; transform: translateY(-2px) !important; }
  .sidebar-btn:hover { background: #f1f5f9 !important; }
  .sidebar-btn.active { background: #1e293b !important; color: white !important; }
  .add-item-btn:hover { background: rgba(0,0,0,.04) !important; }
  .del-btn:hover { color: #f43f5e !important; }
  .pin-btn:hover { color: #475569 !important; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

const STORAGE_KEY = 'nodevault-v1';

const ACCENTS = [
  { id:'stone',   border:'#94a3b8', tint:'#f8fafc', label:'Default' },
  { id:'amber',   border:'#f59e0b', tint:'#fffbeb', label:'Amber'   },
  { id:'emerald', border:'#10b981', tint:'#f0fdf9', label:'Green'   },
  { id:'rose',    border:'#f43f5e', tint:'#fff1f2', label:'Rose'    },
  { id:'violet',  border:'#8b5cf6', tint:'#f5f3ff', label:'Violet'  },
  { id:'sky',     border:'#0ea5e9', tint:'#f0f9ff', label:'Sky'     },
  { id:'orange',  border:'#f97316', tint:'#fff7ed', label:'Orange'  },
];

const CATEGORIES = ['Personal','Work','Shopping','Ideas','Health','Finance','Travel','Other'];
const CAT_ICONS  = { Personal:'👤', Work:'💼', Shopping:'🛒', Ideas:'💡', Health:'❤️', Finance:'💰', Travel:'✈️', Other:'📎' };

const mkId = () => Date.now().toString() + Math.random().toString(36).slice(2,6);

const defaultNote = () => ({
  id: mkId(),
  title:'', content:'', type:'note', items:[],
  category:'Personal', tags:[], color:'stone',
  pinned:false,
  createdAt: new Date().toISOString(),
  updatedAt: new Date().toISOString(),
});

// Highlight matching text
function Hl({ text, q }) {
  if (!q || !text) return <span>{text}</span>;
  const esc = q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  const parts = text.split(new RegExp(`(${esc})`, 'gi'));
  return (
    <span>
      {parts.map((p, i) =>
        p.toLowerCase() === q.toLowerCase()
          ? <mark key={i} style={{ background:'#fef08a', color:'#713f12', borderRadius:2, padding:'0 2px' }}>{p}</mark>
          : p
      )}
    </span>
  );
}

// ── Note Card ────────────────────────────────────────────────────────────────
function NoteCard({ note, onOpen, onPin, onDelete, sq }) {
  const acc = ACCENTS.find(a => a.id === note.color) || ACCENTS[0];
  const checked = note.items.filter(i => i.checked).length;
  const total   = note.items.length;

  return (
    <div
      className="card"
      onClick={() => onOpen(note)}
      style={{
        background: acc.tint,
        borderRadius: 12,
        border: '1px solid #e2e8f0',
        borderLeft: `4px solid ${acc.border}`,
        padding: '14px 16px',
        cursor: 'pointer',
        position: 'relative',
        transition: 'box-shadow .18s, transform .18s',
      }}
    >
      {/* action buttons */}
      <div
        style={{ position:'absolute', top:8, right:8, display:'flex', gap:2, alignItems:'center' }}
        onClick={e => e.stopPropagation()}
      >
        {note.pinned && <span style={{ fontSize:13, marginRight:2 }}>📌</span>}
        <button
          className="pin-btn"
          onClick={() => onPin(note.id)}
          title={note.pinned ? 'Unpin' : 'Pin'}
          style={{ background:'none', border:'none', cursor:'pointer', color:'#94a3b8', fontSize:14, padding:'3px 5px', borderRadius:4, lineHeight:1 }}
        >{note.pinned ? '⊘' : '⊕'}</button>
        <button
          className="del-btn"
          onClick={() => onDelete(note.id)}
          style={{ background:'none', border:'none', cursor:'pointer', color:'#94a3b8', fontSize:13, padding:'3px 5px', borderRadius:4, lineHeight:1 }}
        >✕</button>
      </div>

      {/* title */}
      <div style={{ fontFamily:"'Lora',Georgia,serif", fontSize:15, fontWeight:700, color:'#1e293b', marginBottom:6, paddingRight:56, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap', lineHeight:1.3 }}>
        {note.title
          ? <Hl text={note.title} q={sq} />
          : <span style={{ color:'#cbd5e1', fontStyle:'italic' }}>Untitled</span>}
      </div>

      {/* meta */}
      <div style={{ display:'flex', flexWrap:'wrap', alignItems:'center', gap:5, marginBottom:9 }}>
        <span style={{ fontSize:10, fontWeight:600, color:acc.border, background:acc.border+'28', padding:'2px 8px', borderRadius:20 }}>
          {CAT_ICONS[note.category]} {note.category}
        </span>
        {note.type === 'checklist' &&
          <span style={{ fontSize:10, color:'#64748b', background:'#f1f5f9', padding:'2px 7px', borderRadius:20 }}>☑ List</span>}
        {note.tags.map(t => <span key={t} style={{ fontSize:10, color:'#94a3b8' }}>#{t}</span>)}
      </div>

      {/* checklist preview */}
      {note.type === 'checklist' && total > 0 ? (
        <div>
          <div style={{ height:4, borderRadius:4, background:'#e2e8f0', marginBottom:7, overflow:'hidden' }}>
            <div style={{ height:'100%', width:`${(checked/total)*100}%`, background:acc.border, borderRadius:4, transition:'width .3s' }} />
          </div>
          <div style={{ fontSize:11, color:'#94a3b8', marginBottom:7 }}>{checked}/{total} done</div>
          {note.items.slice(0,4).map(item => (
            <div key={item.id} style={{ display:'flex', alignItems:'center', gap:7, marginBottom:4 }}>
              <span style={{ width:14, height:14, borderRadius:'50%', flexShrink:0, border:`2px solid ${item.checked ? acc.border : '#cbd5e1'}`, background:item.checked ? acc.border : 'transparent', display:'inline-flex', alignItems:'center', justifyContent:'center', fontSize:8, color:'white' }}>
                {item.checked ? '✓' : ''}
              </span>
              <span style={{ fontSize:12.5, color:item.checked ? '#94a3b8' : '#475569', textDecoration:item.checked ? 'line-through' : 'none', overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>
                <Hl text={item.text} q={sq} />
              </span>
            </div>
          ))}
          {total > 4 && <div style={{ fontSize:11, color:'#94a3b8' }}>+{total-4} more…</div>}
        </div>
      ) : (
        <p style={{ fontSize:13, color:'#475569', lineHeight:1.65, margin:0, display:'-webkit-box', WebkitLineClamp:3, WebkitBoxOrient:'vertical', overflow:'hidden' }}>
          {note.content
            ? <Hl text={note.content} q={sq} />
            : <span style={{ color:'#cbd5e1', fontStyle:'italic' }}>No content</span>}
        </p>
      )}

      <div style={{ marginTop:10, fontSize:10.5, color:'#cbd5e1' }}>
        {new Date(note.updatedAt).toLocaleDateString('en-GB', { day:'numeric', month:'short', year:'numeric' })}
      </div>
    </div>
  );
}

// ── Note Editor ───────────────────────────────────────────────────────────────
function NoteEditor({ note, onSave, onClose }) {
  const [draft, setDraft]     = useState({ ...note, items:[...note.items.map(i=>({...i}))] });
  const [tagInput, setTagInput] = useState('');
  const acc     = ACCENTS.find(a => a.id === draft.color) || ACCENTS[0];
  const textRef = useRef(null);

  useEffect(() => {
    if (draft.type === 'note' && textRef.current) textRef.current.focus();
  }, []);

  // Close on Escape
  useEffect(() => {
    const handler = e => { if (e.key === 'Escape') handleSave(); };
    window.addEventListener('keydown', handler);
    return () => window.removeEventListener('keydown', handler);
  }, [draft]);

  const up = (k, v) => setDraft(d => ({ ...d, [k]:v, updatedAt:new Date().toISOString() }));

  const addItem = (afterId) => {
    const newI = { id:mkId(), text:'', checked:false };
    const items = draft.items;
    const idx   = afterId ? items.findIndex(i => i.id === afterId) : items.length - 1;
    up('items', [...items.slice(0, idx+1), newI, ...items.slice(idx+1)]);
    setTimeout(() => document.getElementById(`item-${newI.id}`)?.focus(), 60);
  };

  const updI = (id, text) => up('items', draft.items.map(i => i.id===id ? {...i,text} : i));
  const togI = (id)        => up('items', draft.items.map(i => i.id===id ? {...i,checked:!i.checked} : i));
  const delI = (id)        => up('items', draft.items.filter(i => i.id!==id));

  const addTag = () => {
    const t = tagInput.trim().toLowerCase().replace(/\s+/g,'-');
    if (t && !draft.tags.includes(t)) up('tags', [...draft.tags, t]);
    setTagInput('');
  };

  const handleSave = () => {
    const has = draft.title.trim() || draft.content.trim() || draft.items.some(i=>i.text.trim());
    if (has) onSave({ ...draft, items:draft.items.filter(i=>i.text.trim()) });
    onClose();
  };

  const checked = draft.items.filter(i=>i.checked).length;
  const total   = draft.items.length;
  const ordered = [...draft.items.filter(i=>!i.checked), ...draft.items.filter(i=>i.checked)];

  return (
    <div
      onClick={e => { if (e.target === e.currentTarget) handleSave(); }}
      style={{ position:'fixed', inset:0, background:'rgba(15,23,42,.45)', zIndex:200, display:'flex', alignItems:'center', justifyContent:'center', padding:20, backdropFilter:'blur(6px)' }}
    >
      <div style={{ background:acc.tint, borderRadius:16, border:'1px solid #e2e8f0', borderLeft:`5px solid ${acc.border}`, width:'100%', maxWidth:580, maxHeight:'92vh', display:'flex', flexDirection:'column', boxShadow:'0 24px 64px rgba(0,0,0,.18)', overflow:'hidden', animation:'modalIn .18s ease' }}>

        {/* toolbar */}
        <div style={{ padding:'12px 16px', borderBottom:'1px solid #e2e8f0', display:'flex', gap:8, alignItems:'center', background:'white', flexWrap:'wrap' }}>
          {/* type toggle */}
          <div style={{ display:'flex', background:'#f1f5f9', borderRadius:8, padding:3, gap:2 }}>
            {['note','checklist'].map(t => (
              <button key={t} onClick={() => up('type', t)} style={{ background:draft.type===t?'white':'none', border:'none', cursor:'pointer', color:draft.type===t?'#1e293b':'#94a3b8', fontSize:11.5, fontWeight:draft.type===t?600:400, padding:'4px 12px', borderRadius:6, boxShadow:draft.type===t?'0 1px 4px rgba(0,0,0,.10)':'none', transition:'all .15s' }}>
                {t==='note' ? '◻ Note' : '☑ List'}
              </button>
            ))}
          </div>

          {/* category */}
          <select value={draft.category} onChange={e=>up('category',e.target.value)} style={{ background:'#f8fafc', border:'1px solid #e2e8f0', borderRadius:7, color:'#475569', fontSize:11.5, padding:'4px 8px', flex:1, minWidth:100 }}>
            {CATEGORIES.map(c => <option key={c} value={c}>{CAT_ICONS[c]} {c}</option>)}
          </select>

          {/* colour dots */}
          <div style={{ display:'flex', gap:5, alignItems:'center' }}>
            {ACCENTS.map(a => (
              <button key={a.id} onClick={() => up('color', a.id)} title={a.label} style={{ width:18, height:18, borderRadius:'50%', background:a.border, border:draft.color===a.id?'3px solid #1e293b':'2px solid transparent', cursor:'pointer', outline:'none', transition:'border .15s' }} />
            ))}
          </div>

          {/* pin */}
          <button onClick={() => up('pinned', !draft.pinned)} style={{ background:'none', border:'none', cursor:'pointer', fontSize:17, opacity:draft.pinned?1:.25, transition:'opacity .15s' }} title={draft.pinned?'Unpin':'Pin'}>📌</button>

          {/* save */}
          <button onClick={handleSave} style={{ background:acc.border, border:'none', borderRadius:8, color:'white', fontWeight:700, fontSize:12.5, padding:'6px 16px', cursor:'pointer', boxShadow:`0 2px 8px ${acc.border}55` }}>Save</button>
          <button onClick={handleSave} style={{ background:'none', border:'none', cursor:'pointer', color:'#94a3b8', fontSize:18, lineHeight:1 }}>✕</button>
        </div>

        {/* body */}
        <div style={{ flex:1, overflowY:'auto', padding:'20px 24px' }}>
          <input
            value={draft.title}
            onChange={e => up('title', e.target.value)}
            placeholder="Title"
            style={{ width:'100%', border:'none', outline:'none', background:'none', fontFamily:"'Lora',Georgia,serif", fontSize:24, fontWeight:700, color:'#1e293b', marginBottom:4 }}
          />
          <div style={{ height:1, background:'#e2e8f0', marginBottom:16 }} />

          {draft.type === 'note' ? (
            <textarea
              ref={textRef}
              value={draft.content}
              onChange={e => up('content', e.target.value)}
              placeholder="Start writing…"
              style={{ width:'100%', minHeight:200, border:'none', outline:'none', background:'none', resize:'vertical', fontSize:14.5, lineHeight:1.8, color:'#374151', fontFamily:"'DM Sans',sans-serif" }}
            />
          ) : (
            <div>
              {total > 0 && (
                <div style={{ marginBottom:14 }}>
                  <div style={{ height:5, borderRadius:5, background:'#e2e8f0', overflow:'hidden' }}>
                    <div style={{ height:'100%', borderRadius:5, width:`${total?(checked/total)*100:0}%`, background:acc.border, transition:'width .3s' }} />
                  </div>
                  <div style={{ fontSize:11.5, color:'#94a3b8', marginTop:5 }}>{checked} of {total} completed</div>
                </div>
              )}

              {ordered.map(item => (
                <div key={item.id} style={{ display:'flex', alignItems:'center', gap:10, marginBottom:8 }}>
                  <button
                    onClick={() => togI(item.id)}
                    style={{ width:22, height:22, borderRadius:'50%', flexShrink:0, border:`2px solid ${item.checked?acc.border:'#cbd5e1'}`, background:item.checked?acc.border:'white', cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center', fontSize:10, color:'white', transition:'all .2s' }}
                  >{item.checked ? '✓' : ''}</button>
                  <input
                    id={`item-${item.id}`}
                    value={item.text}
                    onChange={e => updI(item.id, e.target.value)}
                    onKeyDown={e => {
                      if (e.key === 'Enter')    { e.preventDefault(); addItem(item.id); }
                      if (e.key === 'Backspace' && !item.text) { e.preventDefault(); delI(item.id); }
                    }}
                    placeholder="List item…"
                    style={{ flex:1, border:'none', outline:'none', background:'none', fontSize:14, color:item.checked?'#94a3b8':'#374151', textDecoration:item.checked?'line-through':'none', transition:'color .2s', fontFamily:"'DM Sans',sans-serif" }}
                  />
                  <button onClick={() => delI(item.id)} style={{ background:'none', border:'none', cursor:'pointer', color:'#cbd5e1', fontSize:12, padding:'2px 4px' }}>✕</button>
                </div>
              ))}

              <button
                className="add-item-btn"
                onClick={() => addItem()}
                style={{ marginTop:6, background:'none', border:`1.5px dashed ${acc.border}88`, borderRadius:8, color:acc.border, cursor:'pointer', fontSize:12.5, padding:'7px 16px', display:'flex', alignItems:'center', gap:6, transition:'background .15s' }}
              >+ Add item</button>
            </div>
          )}

          {/* tags */}
          <div style={{ marginTop:24, paddingTop:16, borderTop:'1px solid #e2e8f0' }}>
            <div style={{ fontSize:10.5, fontWeight:700, color:'#94a3b8', letterSpacing:.8, marginBottom:8 }}>TAGS</div>
            <div style={{ display:'flex', flexWrap:'wrap', gap:6, marginBottom:10 }}>
              {draft.tags.map(t => (
                <span key={t} style={{ background:acc.border+'25', color:acc.border, border:`1px solid ${acc.border}40`, fontSize:11.5, padding:'3px 10px', borderRadius:20, display:'flex', alignItems:'center', gap:5 }}>
                  #{t}
                  <button onClick={() => up('tags', draft.tags.filter(x=>x!==t))} style={{ background:'none', border:'none', cursor:'pointer', color:'inherit', padding:0, fontSize:10, lineHeight:1 }}>✕</button>
                </span>
              ))}
            </div>
            <div style={{ display:'flex', gap:8 }}>
              <input
                value={tagInput}
                onChange={e => setTagInput(e.target.value)}
                onKeyDown={e => { if (e.key==='Enter'||e.key===',') { e.preventDefault(); addTag(); } }}
                placeholder="Type a tag and press Enter…"
                onFocus={e => e.target.style.borderColor=acc.border}
                onBlur={e => e.target.style.borderColor='#e2e8f0'}
                style={{ flex:1, border:'1px solid #e2e8f0', borderRadius:7, background:'white', color:'#374151', fontSize:12.5, padding:'6px 12px', outline:'none', transition:'border-color .15s', fontFamily:"'DM Sans',sans-serif" }}
              />
              <button onClick={addTag} style={{ background:'#f1f5f9', border:'1px solid #e2e8f0', borderRadius:7, color:'#475569', cursor:'pointer', fontSize:12, padding:'6px 14px' }}>Add</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

// ── Main App ──────────────────────────────────────────────────────────────────
function App() {
  const [notes, setNotes]             = useState([]);
  const [loaded, setLoaded]           = useState(false);
  const [search, setSearch]           = useState('');
  const [filterCat, setFilterCat]     = useState('All');
  const [filterColor, setFilterColor] = useState('All');
  const [sortBy, setSortBy]           = useState('updated');
  const [editNote, setEditNote]       = useState(null);

  // Load from localStorage
  useEffect(() => {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) setNotes(JSON.parse(raw));
    } catch(e) { console.error('Load error', e); }
    setLoaded(true);
  }, []);

  const persist = (n) => {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(n)); }
    catch(e) { console.error('Save error', e); }
  };

  const saveNote = (note) => setNotes(prev => {
    const exists = prev.find(n => n.id === note.id);
    const next   = exists ? prev.map(n => n.id===note.id ? note : n) : [note, ...prev];
    persist(next); return next;
  });

  const deleteNote = (id) => {
    if (!confirm('Delete this note?')) return;
    setNotes(prev => { const next=prev.filter(n=>n.id!==id); persist(next); return next; });
  };

  const pinNote = (id) => setNotes(prev => {
    const next = prev.map(n => n.id===id ? {...n, pinned:!n.pinned} : n);
    persist(next); return next;
  });

  const openNew = (type='note') => {
    const n = defaultNote(); n.type = type; setEditNote(n);
  };

  // Filter + sort
  const filtered = notes
    .filter(n => {
      if (filterCat   !== 'All' && n.category !== filterCat)   return false;
      if (filterColor !== 'All' && n.color    !== filterColor)  return false;
      if (search) {
        const q = search.toLowerCase();
        return (
          n.title.toLowerCase().includes(q)    ||
          n.content.toLowerCase().includes(q)  ||
          n.category.toLowerCase().includes(q) ||
          n.tags.some(t => t.includes(q))      ||
          n.items.some(i => i.text.toLowerCase().includes(q))
        );
      }
      return true;
    })
    .sort((a,b) => {
      if (a.pinned !== b.pinned) return a.pinned ? -1 : 1;
      if (sortBy==='updated') return new Date(b.updatedAt) - new Date(a.updatedAt);
      if (sortBy==='created') return new Date(b.createdAt) - new Date(a.createdAt);
      if (sortBy==='title')   return a.title.localeCompare(b.title);
      return 0;
    });

  const catCounts   = notes.reduce((acc,n) => { acc[n.category]=(acc[n.category]||0)+1; return acc; }, {});
  const pinnedCount = notes.filter(n=>n.pinned).length;

  return (
    <div style={{ minHeight:'100vh', background:'#f1f5f9' }}>

      {/* ── sticky header ── */}
      <div style={{ background:'white', borderBottom:'1px solid #e2e8f0', position:'sticky', top:0, zIndex:50, boxShadow:'0 1px 8px rgba(0,0,0,.06)' }}>
        <div style={{ maxWidth:1060, margin:'0 auto', padding:'0 20px' }}>
          <div style={{ display:'flex', alignItems:'center', gap:14, height:60, flexWrap:'wrap' }}>

            {/* logo */}
            <div style={{ display:'flex', alignItems:'baseline', gap:7, flexShrink:0 }}>
              <span style={{ fontFamily:"'Lora',serif", fontSize:22, fontWeight:800, color:'#1e293b', letterSpacing:-.5 }}>NoteVault</span>
              <span style={{ fontSize:11, color:'#94a3b8' }}>{notes.length} note{notes.length!==1?'s':''}</span>
            </div>

            {/* search */}
            <div style={{ position:'relative', flex:1, maxWidth:400 }}>
              <span style={{ position:'absolute', left:11, top:'50%', transform:'translateY(-50%)', color:'#94a3b8', fontSize:16, pointerEvents:'none' }}>⌕</span>
              <input
                value={search}
                onChange={e => setSearch(e.target.value)}
                placeholder="Search notes, tags, categories…"
                onFocus={e => e.target.style.borderColor='#94a3b8'}
                onBlur={e  => e.target.style.borderColor='#e2e8f0'}
                style={{ width:'100%', background:'#f8fafc', border:'1.5px solid #e2e8f0', borderRadius:10, color:'#1e293b', fontSize:13.5, padding:'8px 32px 8px 34px', outline:'none', transition:'border-color .15s', fontFamily:"'DM Sans',sans-serif" }}
              />
              {search && (
                <button onClick={() => setSearch('')} style={{ position:'absolute', right:10, top:'50%', transform:'translateY(-50%)', background:'none', border:'none', color:'#94a3b8', cursor:'pointer', fontSize:13 }}>✕</button>
              )}
            </div>

            {/* sort */}
            <select value={sortBy} onChange={e=>setSortBy(e.target.value)} style={{ background:'#f8fafc', border:'1.5px solid #e2e8f0', borderRadius:8, color:'#475569', fontSize:12, padding:'7px 10px', cursor:'pointer', outline:'none' }}>
              <option value="updated">↓ Last edited</option>
              <option value="created">↓ Newest first</option>
              <option value="title">A → Z</option>
            </select>

            {/* new buttons */}
            <button onClick={() => openNew('checklist')} style={{ background:'#f0fdf9', border:'1.5px solid #10b98155', borderRadius:9, color:'#10b981', cursor:'pointer', fontSize:12.5, fontWeight:600, padding:'7px 14px', whiteSpace:'nowrap' }}>
              ☑ New List
            </button>
            <button onClick={() => openNew('note')} style={{ background:'#1e293b', border:'none', borderRadius:9, color:'white', cursor:'pointer', fontSize:12.5, fontWeight:700, padding:'7px 18px', whiteSpace:'nowrap', boxShadow:'0 2px 8px rgba(30,41,59,.25)' }}>
              + New Note
            </button>
          </div>
        </div>
      </div>

      {/* ── main layout ── */}
      <div style={{ maxWidth:1060, margin:'0 auto', padding:'20px 20px 60px', display:'flex', gap:20 }}>

        {/* sidebar */}
        <div style={{ width:176, flexShrink:0 }}>

          {/* categories */}
          <div style={{ marginBottom:24 }}>
            <div style={{ fontSize:10.5, fontWeight:700, color:'#94a3b8', letterSpacing:1, marginBottom:8, padding:'0 8px' }}>CATEGORIES</div>
            {['All',...CATEGORIES].map(c => {
              const active = filterCat === c;
              return (
                <button
                  key={c}
                  className={`sidebar-btn${active?' active':''}`}
                  onClick={() => setFilterCat(c)}
                  style={{ width:'100%', display:'flex', alignItems:'center', justifyContent:'space-between', background:active?'#1e293b':'none', border:'none', borderRadius:8, cursor:'pointer', color:active?'white':'#64748b', fontSize:12.5, fontWeight:active?600:400, padding:'7px 10px', marginBottom:2, textAlign:'left', transition:'all .15s' }}
                >
                  <span>{c==='All' ? '📋 All notes' : `${CAT_ICONS[c]} ${c}`}</span>
                  {c!=='All' && catCounts[c] ? (
                    <span style={{ fontSize:10, fontWeight:700, background:active?'rgba(255,255,255,.2)':'#e2e8f0', color:active?'white':'#64748b', borderRadius:10, padding:'1px 7px' }}>{catCounts[c]}</span>
                  ) : null}
                </button>
              );
            })}
          </div>

          {/* colour filter */}
          <div style={{ marginBottom:20 }}>
            <div style={{ fontSize:10.5, fontWeight:700, color:'#94a3b8', letterSpacing:1, marginBottom:8, padding:'0 8px' }}>COLOUR</div>
            <div style={{ display:'flex', flexWrap:'wrap', gap:7, padding:'0 8px' }}>
              <button
                onClick={() => setFilterColor('All')}
                title="All colours"
                style={{ width:20, height:20, borderRadius:'50%', background:filterColor==='All'?'#1e293b':'#e2e8f0', border:'2px solid transparent', cursor:'pointer', fontSize:9, color:'white', fontWeight:700, display:'flex', alignItems:'center', justifyContent:'center' }}
              >✦</button>
              {ACCENTS.filter(a=>a.id!=='stone').map(a => (
                <button
                  key={a.id}
                  onClick={() => setFilterColor(filterColor===a.id ? 'All' : a.id)}
                  title={a.label}
                  style={{ width:20, height:20, borderRadius:'50%', background:a.border, border:filterColor===a.id?'3px solid #1e293b':'2px solid transparent', cursor:'pointer', outline:'none', transition:'border .15s' }}
                />
              ))}
            </div>
          </div>

          {/* pinned count */}
          {pinnedCount > 0 && (
            <div style={{ padding:'10px', background:'#fefce8', border:'1px solid #fde68a', borderRadius:8 }}>
              <div style={{ fontSize:10.5, fontWeight:700, color:'#92400e', letterSpacing:.5 }}>📌 PINNED</div>
              <div style={{ fontSize:12, color:'#78350f', marginTop:2 }}>{pinnedCount} note{pinnedCount!==1?'s':''}</div>
            </div>
          )}

          {/* export/import */}
          <div style={{ marginTop:24, paddingTop:16, borderTop:'1px solid #e2e8f0' }}>
            <div style={{ fontSize:10.5, fontWeight:700, color:'#94a3b8', letterSpacing:1, marginBottom:8, padding:'0 8px' }}>DATA</div>
            <button
              onClick={() => {
                const blob = new Blob([JSON.stringify(notes, null, 2)], { type:'application/json' });
                const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
                a.download = `nodevault-backup-${new Date().toISOString().slice(0,10)}.json`; a.click();
              }}
              style={{ width:'100%', background:'none', border:'1px solid #e2e8f0', borderRadius:7, color:'#64748b', cursor:'pointer', fontSize:11.5, padding:'6px 10px', textAlign:'left', marginBottom:6 }}
            >⬇ Export notes</button>
            <label style={{ width:'100%', display:'block', background:'none', border:'1px solid #e2e8f0', borderRadius:7, color:'#64748b', cursor:'pointer', fontSize:11.5, padding:'6px 10px', textAlign:'left' }}>
              ⬆ Import notes
              <input type="file" accept=".json" style={{ display:'none' }} onChange={e => {
                const file = e.target.files[0]; if (!file) return;
                const reader = new FileReader();
                reader.onload = ev => {
                  try {
                    const imported = JSON.parse(ev.target.result);
                    if (Array.isArray(imported)) {
                      if (confirm(`Import ${imported.length} notes? This will merge with existing notes.`)) {
                        setNotes(prev => {
                          const ids = new Set(prev.map(n=>n.id));
                          const newOnes = imported.filter(n=>!ids.has(n.id));
                          const next = [...newOnes, ...prev];
                          persist(next); return next;
                        });
                      }
                    }
                  } catch { alert('Invalid file'); }
                };
                reader.readAsText(file);
                e.target.value = '';
              }} />
            </label>
          </div>
        </div>

        {/* notes grid */}
        <div style={{ flex:1 }}>
          {search && filtered.length > 0 && (
            <div style={{ fontSize:12, color:'#94a3b8', marginBottom:12 }}>
              {filtered.length} result{filtered.length!==1?'s':''} for <strong style={{ color:'#475569' }}>"{search}"</strong>
            </div>
          )}

          {!loaded ? (
            <div style={{ textAlign:'center', padding:60, color:'#94a3b8' }}>Loading…</div>
          ) : filtered.length === 0 ? (
            <div style={{ textAlign:'center', padding:'80px 20px', animation:'fadeIn .3s ease' }}>
              <div style={{ fontSize:52, marginBottom:16 }}>{search ? '🔍' : '📝'}</div>
              <p style={{ color:'#94a3b8', fontSize:15, marginBottom:20 }}>
                {search
                  ? `No notes match "${search}"`
                  : filterCat !== 'All'
                    ? `No notes in ${filterCat} yet`
                    : 'No notes yet — create your first one!'}
              </p>
              {!search && (
                <div style={{ display:'flex', gap:10, justifyContent:'center' }}>
                  <button onClick={() => openNew('note')} style={{ background:'#1e293b', border:'none', borderRadius:9, color:'white', cursor:'pointer', fontSize:13, fontWeight:700, padding:'9px 20px' }}>+ New Note</button>
                  <button onClick={() => openNew('checklist')} style={{ background:'#f0fdf9', border:'1.5px solid #10b98155', borderRadius:9, color:'#10b981', cursor:'pointer', fontSize:13, fontWeight:600, padding:'9px 20px' }}>☑ New List</button>
                </div>
              )}
            </div>
          ) : (
            <div style={{ display:'grid', gridTemplateColumns:'repeat(auto-fill,minmax(230px,1fr))', gap:14, alignItems:'start' }}>
              {filtered.map((note, i) => (
                <div key={note.id} style={{ animation:`cardIn .25s ease ${Math.min(i,8)*30}ms both` }}>
                  <NoteCard note={note} onOpen={setEditNote} onPin={pinNote} onDelete={deleteNote} sq={search} />
                </div>
              ))}
            </div>
          )}
        </div>
      </div>

      {/* editor modal */}
      {editNote && (
        <NoteEditor note={editNote} onSave={saveNote} onClose={() => setEditNote(null)} />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
